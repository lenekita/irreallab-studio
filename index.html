<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IRREALLAB STUDIO</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--s1:#0e0e1c;--s2:#16162a;--border:#252540;--bh:#3a3a65;
  --text:#eeeeff;--muted:#8888bb;
  --pu:#8b5cf6;--pul:#a78bfa;--pud:#5b21b6;
  --gr:#10b981;--re:#f87171;--bl:#3b82f6;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 65% 45% at 10% 10%, rgba(139,92,246,.15) 0%, transparent 65%),
    radial-gradient(ellipse 55% 40% at 90% 90%, rgba(59,130,246,.1)  0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(236,72,153,.05) 0%, transparent 60%);
}

.wrap{max-width:860px;margin:0 auto;padding:32px 20px;position:relative;z-index:1}

/* ── header ── */
header{
  display:flex;align-items:center;gap:14px;
  margin-bottom:32px;
}
.logo-icon{
  width:46px;height:46px;border-radius:13px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:23px;
  background:linear-gradient(135deg,var(--pud),var(--pu) 50%,var(--bl));
  box-shadow:0 0 24px rgba(139,92,246,.35);
}
.logo-text h1{
  font-size:20px;font-weight:700;letter-spacing:-.3px;
  background:linear-gradient(90deg,var(--pul),var(--bl));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-text p{font-size:11px;color:var(--muted);margin-top:2px}

/* ── free chip ── */
.free-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--s1);border:1px solid rgba(16,185,129,.3);
  border-radius:13px;padding:13px 18px;margin-bottom:28px;font-size:13px;
  color:var(--muted);
}
.chip-green{
  padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;
  background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)
}

/* ── input ── */
.input-label{
  display:block;font-size:11px;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted);margin-bottom:10px;
}
.ibox{position:relative;margin-bottom:36px}
textarea.idea{
  width:100%;padding:18px 160px 18px 20px;
  background:var(--s1);border:1px solid var(--border);
  border-radius:16px;color:var(--text);font-size:15px;
  font-family:inherit;line-height:1.6;
  resize:none;outline:none;min-height:64px;max-height:200px;
  overflow-y:auto;transition:.2s;
}
textarea.idea::placeholder{color:var(--muted)}
textarea.idea:focus{
  border-color:var(--pu);
  box-shadow:0 0 0 3px rgba(139,92,246,.15),0 0 24px rgba(139,92,246,.08);
}
.gen-btn{
  position:absolute;right:11px;top:50%;transform:translateY(-50%);
  padding:11px 26px;
  background:linear-gradient(135deg,var(--pud),var(--pu));
  border:none;border-radius:11px;color:#fff;
  font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:.18s;white-space:nowrap;
}
.gen-btn:hover:not(:disabled){
  transform:translateY(-50%) scale(1.03);
  box-shadow:0 4px 24px rgba(139,92,246,.5);
}
.gen-btn:active:not(:disabled){transform:translateY(-50%) scale(.97)}
.gen-btn:disabled{opacity:.4;cursor:not-allowed;transform:translateY(-50%)}
.spin{
  width:14px;height:14px;
  border:2px solid rgba(255,255,255,.25);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;display:none;
}
.gen-btn.busy .spin{display:block}
.gen-btn.busy .lbl{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── card ── */
.card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;
}
.ch{
  padding:14px 17px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.badge-p{
  padding:3px 11px;border-radius:20px;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  background:rgba(139,92,246,.18);color:var(--pul);border:1px solid rgba(139,92,246,.3)
}
.cmodel{font-size:12px;color:var(--muted);flex:1}
.fc{
  font-size:10px;color:var(--gr);
  background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);
  padding:2px 7px;border-radius:20px;
}
.dl{
  width:30px;height:30px;border-radius:8px;
  background:var(--s2);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;text-decoration:none;transition:.18s;
}
.dl:hover{border-color:var(--pu);color:var(--text)}

/* card body */
.cb{
  aspect-ratio:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  padding:20px;text-align:center;
}
.ph-ico{font-size:48px;opacity:.15}
.ph-txt{font-size:14px;color:var(--muted);line-height:1.6;max-width:320px}
.ring{
  width:50px;height:50px;
  border:3px solid var(--border);border-top-color:var(--pu);
  border-radius:50%;animation:spin .8s linear infinite;
}
.lt{font-size:13px;color:var(--muted)}
.err-ico{font-size:30px}
.err-txt{font-size:12px;color:var(--re);max-width:300px;line-height:1.6}
.retry-btn{
  margin-top:8px;padding:7px 16px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;
  transition:.15s;
}
.retry-btn:hover{border-color:var(--pu);color:var(--text)}
.card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block}

/* card footer */
.cf{padding:11px 15px;border-top:1px solid var(--border)}
.pt{
  width:100%;background:none;border:none;
  color:var(--muted);font-size:12px;cursor:pointer;
  text-align:left;padding:0;display:flex;align-items:center;gap:6px;
  transition:.15s;
}
.pt:hover{color:var(--text)}
.ptxt{
  display:none;margin-top:9px;font-size:11.5px;
  color:var(--muted);line-height:1.6;
  background:var(--s2);padding:10px 13px;
  border-radius:8px;border:1px solid var(--border);
  word-break:break-word;
}
.ptxt.on{display:block}

/* ── toast ── */
.toast{
  position:fixed;bottom:22px;right:22px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:12px 18px;
  font-size:13px;z-index:200;
  transform:translateY(70px);opacity:0;transition:.28s;pointer-events:none;
}
.toast.on{transform:none;opacity:1}
.toast.ok{border-color:var(--gr)}.toast.er{border-color:var(--re)}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo-icon">🎨</div>
    <div class="logo-text">
      <h1>IRREALLAB STUDIO</h1>
      <p>AI Image Generation · Powered by Pollinations FLUX</p>
    </div>
  </header>

  <!-- Free bar -->
  <div class="free-bar">
    <span class="chip-green">100% Free</span>
    <span>No account or API key needed — generate unlimited images instantly.</span>
  </div>

  <!-- Input -->
  <label class="input-label" for="idea">Your image idea</label>
  <div class="ibox">
    <textarea class="idea" id="idea" rows="1"
      placeholder="A girl walking on the moon, realistic…"
      onkeydown="onKey(event)"
      oninput="grow(this)"></textarea>
    <button class="gen-btn" id="genBtn" onclick="generate()">
      <div class="spin"></div>
      <span class="lbl">✦ Generate</span>
    </button>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="ch">
      <span class="badge-p">Pollinations</span>
      <span class="cmodel">FLUX · by Pollinations.ai</span>
      <span class="fc">FREE</span>
      <a class="dl" id="pdl" style="display:none" title="Download image">↓</a>
    </div>
    <div class="cb" id="pph">
      <div class="ph-ico">🖼</div>
      <div class="ph-txt">Type your image idea above and hit Generate — no sign-up required.</div>
    </div>
    <div class="cb" id="pld" style="display:none">
      <div class="ring"></div>
      <div class="lt">Generating your image…</div>
    </div>
    <div class="cb" id="perr" style="display:none">
      <div class="err-ico">⚠️</div>
      <div class="err-txt" id="perrtxt"></div>
      <button class="retry-btn" onclick="retry()">↺ Try again</button>
    </div>
    <img class="card-img" id="pimg" style="display:none" alt="Generated image">
    <div class="cf" id="pcf" style="display:none">
      <button class="pt" onclick="tog()">
        <span id="parr">▶</span> View crafted prompt
      </button>
      <div class="ptxt" id="pptxt"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─── Prompt engineering ───────────────────────────────────────────────────────

const STYLE_MAP = {
  realistic:     "photorealistic, cinematic, shot on Sony A7R V, 8K",
  photo:         "documentary photography, professional camera, natural light",
  cartoon:       "vibrant cartoon illustration, bold outlines, digital art",
  anime:         "anime style, detailed, vibrant, Studio Ghibli inspired",
  watercolor:    "watercolor painting, soft flowing brushstrokes, artistic",
  "oil painting":"oil painting, thick brushwork, classical technique",
  "3d":          "3D render, Octane render, volumetric lighting, 8K",
  cyberpunk:     "cyberpunk aesthetic, neon lights, rain-soaked streets",
  fantasy:       "epic fantasy art, magical atmosphere, cinematic, intricate detail",
  portrait:      "studio portrait photography, Rembrandt lighting, bokeh",
  landscape:     "landscape photography, ultra-wide angle, golden hour",
  abstract:      "abstract digital art, vivid colours, geometric tension",
  vintage:       "vintage film photograph, Kodak grain, warm tones, 1970s",
  minimalist:    "minimalist composition, negative space, clean lines",
  sketch:        "detailed pencil sketch, fine hatching, technical illustration",
}

const NIGHT = new Set(["night","dark","moon","stars","star","lunar","midnight","space","galaxy","twilight"])
const WARM  = new Set(["sunset","sunrise","dawn","dusk","golden"])

function craftPrompt(idea){
  const low = idea.toLowerCase()
  let style = "photorealistic, cinematic, 8K, professional photography"
  for(const [kw, s] of Object.entries(STYLE_MAP)){
    if(low.includes(kw)){ style = s; break }
  }
  const words = low.split(/\W+/)
  let lighting = "soft natural lighting, perfect exposure, sharp focus"
  if(words.some(x => NIGHT.has(x))) lighting = "moonlight, deep blue night sky, ethereal glow"
  else if(words.some(x => WARM.has(x))) lighting = "golden hour warm light, long dramatic shadows"
  return `${idea}, ${style}, ${lighting}, intricate detail, rule of thirds, award-winning`
}

// ─── Image generation ─────────────────────────────────────────────────────────

let lastPrompt = ""

async function genPollinations(prompt){
  const seed = Math.floor(Math.random()*999999)
  const encoded = encodeURIComponent(prompt)
  const urls = [
    `https://image.pollinations.ai/prompt/${encoded}?width=1024&height=1024&seed=${seed}`,
    `https://image.pollinations.ai/prompt/${encoded}?model=turbo&width=1024&height=1024&seed=${seed}`,
    `https://image.pollinations.ai/prompt/${encoded}?seed=${seed}`,
  ]
  let lastStatus = 0
  for(const url of urls){
    const r = await fetch(url)
    if(r.ok){
      const blob = await r.blob()
      if(blob.type.startsWith('image/')) return URL.createObjectURL(blob)
    }
    lastStatus = r.status
  }
  throw new Error(`Pollinations unavailable (${lastStatus}) — please try again shortly.`)
}

// ─── UI ───────────────────────────────────────────────────────────────────────

function show(id, flex){ document.getElementById(id).style.display = flex ? 'flex' : 'block' }
function hide(id){ document.getElementById(id).style.display = 'none' }
function setText(id, t){ document.getElementById(id).textContent = t }

function toast(msg, type=''){
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = 'toast on' + (type ? ' '+type : '')
  clearTimeout(el._t)
  el._t = setTimeout(() => el.className = 'toast', 3200)
}

function grow(el){
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 200) + 'px'
}

function onKey(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); generate() }
}

function tog(){
  const t = document.getElementById('pptxt')
  const a = document.getElementById('parr')
  t.classList.toggle('on')
  a.textContent = t.classList.contains('on') ? '▼' : '▶'
}

function setState(state){
  for(const s of ['pph','pld','perr','pimg','pcf']){
    document.getElementById(s).style.display = 'none'
  }
  hide('pdl')
  if(state === 'ph')  show('pph', true)
  if(state === 'ld')  show('pld', true)
  if(state === 'err') show('perr', true)
  if(state === 'img'){ show('pimg'); show('pcf') }
}

async function generate(){
  const idea = document.getElementById('idea').value.trim()
  if(!idea){ toast('Enter an image idea first', 'er'); return }

  const btn = document.getElementById('genBtn')
  btn.disabled = true
  btn.classList.add('busy')
  setState('ld')

  const prompt = craftPrompt(idea)
  lastPrompt = prompt

  try {
    const src = await genPollinations(prompt)
    const img = document.getElementById('pimg')
    img.src = src
    setState('img')
    setText('pptxt', prompt)
    const dl = document.getElementById('pdl')
    dl.href = src
    dl.download = `irreallab-${Date.now()}.png`
    show('pdl', true)
  } catch(e) {
    setState('err')
    setText('perrtxt', e.message)
  }

  btn.disabled = false
  btn.classList.remove('busy')
}

function retry(){
  if(lastPrompt){
    document.getElementById('idea').dispatchEvent(new Event('input'))
    generate()
  }
}
</script>
</body>
</html>
