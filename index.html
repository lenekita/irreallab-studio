<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IRREALLAB STUDIO — AI Image Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060606; --accent:#d4f03a; --text:#ede9df;
  --muted:#4a4a4a; --s1:#0d0d0d; --s2:#111; --border:#1c1c1c;
  --red:#f87171;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(circle at 15% 20%,rgba(212,240,58,.07) 0%,transparent 45%),
             radial-gradient(circle at 85% 85%,rgba(212,240,58,.04) 0%,transparent 45%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.wrap{max-width:1000px;margin:0 auto;padding:56px 24px 80px;position:relative;z-index:10;}

/* ── HEADER ── */
.eyebrow{font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.eyebrow::before{content:'';width:28px;height:1px;background:var(--muted);}
.eyebrow span{color:var(--accent);}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,10vw,7.5rem);
  line-height:.88;letter-spacing:-.01em;color:var(--text);
  text-shadow:0 0 60px rgba(212,240,58,.08);margin-bottom:18px;}
h1 em{color:var(--accent);font-style:normal;}
.tagline{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
  margin-bottom:52px;display:flex;align-items:center;gap:14px;}
.tagline::after{content:'';flex:1;max-width:200px;height:1px;background:var(--border);}

/* ── INPUTS ── */
.field-label{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);display:block;margin-bottom:10px;}
.prompt-wrap{position:relative;margin-bottom:24px;}
textarea{
  width:100%;min-height:72px;max-height:200px;
  padding:20px 180px 20px 20px;
  background:var(--s1);border:1px solid var(--border);border-radius:3px;
  color:var(--text);font-family:'Space Mono',monospace;font-size:13px;
  line-height:1.65;resize:none;outline:none;overflow-y:auto;transition:border-color .2s;
}
textarea::placeholder{color:var(--muted);}
textarea:focus{border-color:rgba(212,240,58,.35);}
.gen-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  padding:13px 28px;background:var(--accent);border:none;border-radius:2px;
  color:#060606;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.06em;
  cursor:pointer;display:flex;align-items:center;gap:8px;transition:.15s;white-space:nowrap;
}
.gen-btn:hover:not(:disabled){background:#e8ff52;transform:translateY(-50%) scale(1.02);}
.gen-btn:disabled{opacity:.35;cursor:not-allowed;transform:translateY(-50%);}
.spin{width:13px;height:13px;border:2px solid rgba(6,6,6,.3);border-top-color:#060606;
  border-radius:50%;animation:spin .6s linear infinite;display:none;}
.gen-btn.busy .spin{display:block;}
.gen-btn.busy .lbl{display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── PILLS ── */
.row-label{font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);display:block;margin-bottom:10px;}
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.pill{
  padding:5px 13px;background:transparent;border:1px solid var(--border);border-radius:2px;
  color:var(--muted);font-family:'Space Mono',monospace;font-size:9.5px;
  letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:.15s;
}
.pill:hover{border-color:rgba(212,240,58,.35);color:var(--text);}
.pill.on{background:var(--accent);border-color:var(--accent);color:#060606;font-weight:700;}

/* ── SETTINGS ROW (ratio + variations) ── */
.settings-row{display:flex;align-items:flex-start;gap:32px;margin-bottom:44px;flex-wrap:wrap;}
.setting-group{}
.s-btns{display:flex;gap:7px;}
.s-btn{
  padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:2px;
  color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:.15s;
}
.s-btn:hover{border-color:rgba(212,240,58,.3);color:var(--text);}
.s-btn.on{border-color:var(--accent);color:var(--accent);}

/* ── OUTPUT HEADER ── */
.out-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.out-meta{display:flex;align-items:center;gap:14px;}
.out-count{font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.regen-btn{
  padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:2px;
  color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:.15s;display:none;
}
.regen-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── OUTPUT GRID ── */
.out-grid{display:grid;gap:12px;margin-bottom:12px;}
.out-grid.n1{grid-template-columns:1fr;}
.out-grid.n2{grid-template-columns:1fr 1fr;}
.out-grid.n4{grid-template-columns:repeat(2,1fr);}

/* ── OUTPUT CARD ── */
.out-card{
  background:var(--s1);border:1px solid var(--border);border-radius:3px;
  overflow:hidden;position:relative;
}

/* card states */
.card-ph,.card-ld,.card-er{
  aspect-ratio:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;padding:32px;text-align:center;
}
.card-ld{display:none;}
.card-er{display:none;}

.card-ph-icon{font-size:36px;opacity:.07;}
.card-ph-txt{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}

/* mini spinner */
.mini-ring{
  width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;
}
.card-ld-msg{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);max-width:200px;line-height:1.8;text-align:center;}

/* error */
.card-er-txt{font-size:.58rem;color:var(--red);line-height:1.7;max-width:240px;}
.card-retry{
  margin-top:4px;padding:6px 14px;background:transparent;
  border:1px solid var(--red);border-radius:2px;color:var(--red);
  font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;transition:.15s;
}
.card-retry:hover{background:rgba(248,113,113,.08);}

/* result image */
.card-img{width:100%;display:none;aspect-ratio:1;object-fit:cover;}

/* card footer */
.card-foot{
  display:none;padding:9px 12px;border-top:1px solid var(--border);
  align-items:center;justify-content:space-between;
}
.card-foot.show{display:flex;}
.card-gen-badge{
  font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:5px;
}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}
.card-actions-row{display:flex;gap:6px;}
.card-dl,.card-prompt-btn{
  padding:4px 10px;background:transparent;border:1px solid var(--border);border-radius:2px;
  color:var(--muted);font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;transition:.15s;
}
.card-dl:hover,.card-prompt-btn:hover{border-color:var(--accent);color:var(--accent);}

/* prompt drawer */
.card-prompt-drawer{
  display:none;padding:10px 12px;border-top:1px solid var(--border);
  font-size:.58rem;color:var(--muted);line-height:1.7;word-break:break-word;
  background:var(--bg);
}
.card-prompt-drawer.open{display:block;}

/* ── DIVIDER ── */
.div{border:none;border-top:1px solid var(--border);margin:52px 0;}

/* ── HISTORY ── */
.hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.clr-btn{
  background:none;border:none;color:var(--muted);font-family:'Space Mono',monospace;
  font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:color .15s;
}
.clr-btn:hover{color:var(--red);}
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.hi{
  aspect-ratio:1;overflow:hidden;border-radius:3px;cursor:pointer;
  border:1px solid var(--border);position:relative;
}
.hi img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.hi:hover img{transform:scale(1.06);}
.hi-ov{
  position:absolute;inset:0;background:rgba(6,6,6,.65);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.hi:hover .hi-ov{opacity:1;}
.hi-ov span{font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);}

/* ── FOOTER ── */
footer{margin-top:72px;padding-top:24px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.ft-brand{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted);}
.ft-note{font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--border);
  border-radius:2px;padding:12px 18px;font-family:'Space Mono',monospace;font-size:.62rem;
  letter-spacing:.05em;z-index:200;transform:translateY(60px);opacity:0;
  transition:.25s;pointer-events:none;
}
.toast.on{transform:none;opacity:1;}
.toast.ok{border-color:var(--accent);color:var(--accent);}
.toast.er{border-color:var(--red);color:var(--red);}

@media(max-width:600px){
  h1{font-size:3rem;}
  .gen-btn{padding:10px 16px;font-size:16px;right:8px;}
  textarea{padding-right:110px;}
  .out-grid.n2,.out-grid.n4{grid-template-columns:1fr;}
  .settings-row{gap:18px;}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="eyebrow"><span>personal workspace</span> · AI image generation</div>
  <h1>IRREALLAB<br><em>STUDIO</em></h1>
  <p class="tagline">Dual-engine · Stable Diffusion + Hugging Face SDXL · 100% free · No auth</p>

  <!-- Prompt -->
  <label class="field-label" for="idea">Describe your image</label>
  <div class="prompt-wrap">
    <textarea id="idea" rows="2"
      placeholder="A surreal cityscape at golden hour, fog rolling through glass towers…"
      onkeydown="onKey(event)" oninput="grow(this)"></textarea>
    <button class="gen-btn" id="genBtn" onclick="generate()">
      <div class="spin"></div>
      <span class="lbl">GENERATE</span>
    </button>
  </div>

  <!-- Style pills -->
  <span class="row-label">Style</span>
  <div class="pills">
    <button class="pill on"  data-s="cinematic"  onclick="setStyle(this)">Cinematic</button>
    <button class="pill"     data-s="realistic"  onclick="setStyle(this)">Realistic</button>
    <button class="pill"     data-s="portrait"   onclick="setStyle(this)">Portrait</button>
    <button class="pill"     data-s="anime"      onclick="setStyle(this)">Anime</button>
    <button class="pill"     data-s="cyberpunk"  onclick="setStyle(this)">Cyberpunk</button>
    <button class="pill"     data-s="fantasy"    onclick="setStyle(this)">Fantasy</button>
    <button class="pill"     data-s="abstract"   onclick="setStyle(this)">Abstract</button>
    <button class="pill"     data-s="vintage"    onclick="setStyle(this)">Vintage</button>
    <button class="pill"     data-s="minimal"    onclick="setStyle(this)">Minimal</button>
    <button class="pill"     data-s="horror"     onclick="setStyle(this)">Dark / Horror</button>
    <button class="pill"     data-s="surreal"    onclick="setStyle(this)">Surreal</button>
    <button class="pill"     data-s="render3d"   onclick="setStyle(this)">3D Render</button>
  </div>

  <!-- Format + Variations -->
  <div class="settings-row">
    <div class="setting-group">
      <span class="row-label">Format</span>
      <div class="s-btns" id="ratioRow">
        <button class="s-btn on" data-w="1024" data-h="1024" onclick="setRatio(this)">1:1 Square</button>
        <button class="s-btn"    data-w="1024" data-h="576"  onclick="setRatio(this)">16:9 Wide</button>
        <button class="s-btn"    data-w="576"  data-h="1024" onclick="setRatio(this)">9:16 Tall</button>
        <button class="s-btn"    data-w="1024" data-h="768"  onclick="setRatio(this)">4:3</button>
      </div>
    </div>
    <div class="setting-group">
      <span class="row-label">Variations</span>
      <div class="s-btns" id="varRow">
        <button class="s-btn"    data-v="1" onclick="setVar(this)">× 1</button>
        <button class="s-btn on" data-v="2" onclick="setVar(this)">× 2</button>
        <button class="s-btn"    data-v="4" onclick="setVar(this)">× 4</button>
      </div>
    </div>
  </div>

  <!-- Output -->
  <div class="out-header">
    <div class="out-meta">
      <span class="field-label" style="margin:0">Output</span>
      <span class="out-count" id="outCount"></span>
    </div>
    <button class="regen-btn" id="regenBtn" onclick="generate()">↺ New variations</button>
  </div>

  <div class="out-grid n2" id="outGrid">
    <!-- cards injected by JS -->
    <div class="out-card">
      <div class="card-ph">
        <div class="card-ph-icon">✦</div>
        <div class="card-ph-txt">Your images<br>will appear here</div>
      </div>
    </div>
    <div class="out-card">
      <div class="card-ph">
        <div class="card-ph-icon">✦</div>
        <div class="card-ph-txt">Your images<br>will appear here</div>
      </div>
    </div>
  </div>

  <hr class="div">

  <!-- History -->
  <div id="histWrap" style="display:none">
    <div class="hist-header">
      <span class="field-label" style="margin:0">Recent generations</span>
      <button class="clr-btn" onclick="clearHistory()">Clear all</button>
    </div>
    <div class="hist-grid" id="histGrid"></div>
    <hr class="div">
  </div>

  <!-- Footer -->
  <footer>
    <div class="ft-brand">IRREALLAB</div>
    <div class="ft-note">Personal workspace · Local only</div>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let activeStyle = 'cinematic'
let imgW = 1024, imgH = 1024
let varCount = 2
let history = []
let lastIdea = ''

// ─── Prompt maps — FLUX vs Stable Diffusion use completely different syntax ──

// FLUX (Pollinations): loves descriptive natural language sentences
const FLUX_STYLES = {
  cinematic: 'cinematic wide-angle photography with dramatic chiaroscuro lighting, shallow depth of field, anamorphic lens flare, color-graded film aesthetic',
  realistic: 'ultra-photorealistic professional photography, natural light, shot on Sony A7R V, tack-sharp with rich detail',
  portrait:  'intimate studio portrait photography, Rembrandt loop lighting, 85mm f/1.4 bokeh, eyes perfectly in focus',
  anime:     'anime key visual illustration in Studio Ghibli style, hand-painted quality, expressive line art, vibrant palette',
  cyberpunk: 'cyberpunk noir cityscape, neon lights reflecting on rain-slicked streets, holographic signs, Blade Runner 2049 atmosphere',
  fantasy:   'epic high-fantasy concept art, magical golden light particles, towering architecture, painterly cinematic composition',
  abstract:  'abstract expressionist digital art, bold chromatic contrasts, dynamic geometric tension, surreal non-representational forms',
  vintage:   'vintage analog photograph, expired Kodak film with halation and grain, warm faded tones, light leaks, 1970s aesthetic',
  minimal:   'minimalist architectural photography, radical negative space, monochromatic palette, precise clean geometry',
  horror:    'dark atmospheric horror, dense volumetric fog, deep underexposed shadows, unsettling eerie silence, cinematic dread',
  surreal:   'hyper-detailed surrealist dreamscape, impossible gravity-defying architecture, Dalí-esque imagination, dream logic',
  render3d:  'photorealistic 3D CGI render, Octane Render engine, volumetric god rays, subsurface scattering, perfect physically-based materials',
}

// Stable Diffusion: weighted tags for maximum quality
const SD_STYLES = {
  cinematic: '(cinematic:1.4), (award-winning:1.3), (dramatic lighting:1.3), (film grain:1.1), anamorphic lens, DCI color graded, (chiaroscuro:1.2), shallow depth of field',
  realistic: '(photorealistic:1.5), (hyperrealistic:1.3), RAW photo, (professional photography:1.3), (8k uhd:1.2), (sharp focus:1.2), (intricate detail:1.2), DSLR',
  portrait:  '(portrait:1.4), (studio portrait:1.3), (professional lighting:1.3), (rembrandt:1.2), (bokeh:1.2), (sharp eyes:1.4), (skin texture:1.2), headshot',
  anime:     '(anime:1.4), (illustration:1.3), (Studio Ghibli:1.2), (cel shading:1.1), (vibrant colors:1.2), key visual, manga style, expressive',
  cyberpunk: '(cyberpunk:1.4), (neon lights:1.3), (rain-soaked:1.2), (dark alley:1.1), holographic, blade runner, (atmospheric:1.3), noir, moody',
  fantasy:   '(epic fantasy:1.4), (magical:1.3), (dramatic sky:1.2), concept art, (painted:1.2), (detailed:1.3), (cinematic:1.2), wlop inspired',
  abstract:  '(abstract art:1.4), (geometric:1.2), (vivid colors:1.3), (surreal:1.2), expressionist, modern, (digital art:1.1), (complex:1.2)',
  vintage:   '(vintage:1.3), (film grain:1.3), Kodak, (analog:1.2), (warm tones:1.2), light leaks, (retro:1.2), 1970s aesthetic, vignette',
  minimal:   '(minimalist:1.4), (negative space:1.3), (clean lines:1.2), monochromatic, (elegant:1.3), (architectural:1.2), serene, simple',
  horror:    '(horror:1.4), (dark:1.3), (eerie:1.2), fog, (deep shadows:1.3), (unsettling:1.2), gothic, terrifying, (atmospheric:1.2)',
  surreal:   '(surrealist:1.4), (dreamscape:1.3), impossible geometry, Dalí, (hyper detailed:1.2), fantasy, dream logic, (magical:1.2)',
  render3d:  '(3D render:1.4), (Octane render:1.2), volumetric light, (photorealistic:1.3), subsurface scattering, (CGI:1.1), professional, polished',
}

// Negative prompt for SD — crucial for quality
const SD_NEG = 'ugly, blurry, low quality, bad anatomy, worst quality, lowres, jpeg artifacts, watermark, text, signature, duplicate, deformed, disfigured, extra limbs, bad hands, cropped, out of frame'

const NIGHT_W = new Set(['night','dark','moon','stars','lunar','midnight','space','galaxy','twilight','shadow'])
const WARM_W  = new Set(['sunset','sunrise','dawn','dusk','golden','warm','fire'])

function getLighting(idea) {
  const w = idea.toLowerCase().split(/\W+/)
  if(w.some(x => NIGHT_W.has(x))) return 'moonlit night, deep indigo shadows, ethereal glow'
  if(w.some(x => WARM_W.has(x)))  return 'golden hour backlight, warm sun rays, cinematic shadows'
  return 'soft natural diffused light, professional colour grade'
}

function getLightingSD(idea) {
  const w = idea.toLowerCase().split(/\W+/)
  if(w.some(x => NIGHT_W.has(x))) return '(moonlight:1.2), night, dark blue atmosphere, (ethereal:1.1)'
  if(w.some(x => WARM_W.has(x)))  return '(golden hour:1.2), warm light, (sun rays:1.1), cinematic'
  return '(soft lighting:1.1), professional, (well lit:1.1)'
}

// Build prompt optimised for FLUX (natural language)
function buildFluxPrompt(idea) {
  const style   = FLUX_STYLES[activeStyle] || FLUX_STYLES.cinematic
  const light   = getLighting(idea)
  return `${idea}. ${style}. ${light}. Masterpiece quality, highly detailed, award-winning.`
}

// Build prompt optimised for Stable Diffusion (weighted tags)
function buildSDPrompt(idea) {
  const style = SD_STYLES[activeStyle] || SD_STYLES.cinematic
  const light = getLightingSD(idea)
  const quality = 'masterpiece, best quality, (ultra detailed:1.2), sharp focus, 8k uhd'
  return `${idea}, ${style}, ${light}, ${quality}`
}

// ─── Generation ───────────────────────────────────────────────────────────────
async function generate() {
  const idea = document.getElementById('idea').value.trim()
  if(!idea) { showToast('Enter your image idea first', 'er'); return }

  lastIdea = idea
  const btn = document.getElementById('genBtn')
  btn.disabled = true; btn.classList.add('busy')

  renderGrid(varCount)
  document.getElementById('outCount').textContent = ''
  document.getElementById('regenBtn').style.display = 'none'

  let done = 0

  // Launch all variations in parallel
  const jobs = Array.from({ length: varCount }, (_, i) => {
    const seed = Math.floor(Math.random() * 999999)
    return generateSlot(i, idea, seed).then(() => {
      done++
      document.getElementById('outCount').textContent = `${done} / ${varCount} ready`
    }).catch(() => { done++ })
  })

  await Promise.allSettled(jobs)

  document.getElementById('regenBtn').style.display = 'inline-flex'
  btn.disabled = false; btn.classList.remove('busy')
}

async function generateSlot(slotId, idea, seed) {
  setCardState(slotId, 'ld')
  setCardMsg(slotId, 'Racing generators…')

  const sdPrompt = buildSDPrompt(idea)

  // Race Stable Horde vs Hugging Face — whoever finishes first wins
  const hordeRace = stableHorde(sdPrompt, seed, slotId)
  const hfRace = huggingFaceInference(sdPrompt, seed, slotId)

  try {
    const { src, generator } = await Promise.any([hordeRace, hfRace])
    setCardState(slotId, 'img', src, generator, '', sdPrompt)
    addHistory(src, idea)
  } catch(e) {
    setCardState(slotId, 'er', null, null, null, null,
      `Both generators failed: ${e.message}`)
    throw e
  }
}


// ── Stable Horde — SD-optimised prompt with negative prompt ──
async function stableHorde(prompt, seed, slotId) {
  setCardMsg(slotId, 'Queuing on Stable Horde…')

  const maxDim = 768
  const ratio  = imgW / imgH
  let w, h
  if(ratio >= 1) { w = maxDim; h = Math.round(maxDim / ratio / 64) * 64 }
  else           { h = maxDim; w = Math.round(maxDim * ratio / 64) * 64 }
  w = Math.max(w, 512); h = Math.max(h, 512)

  // Stable Diffusion request — use minimal working config
  const body = {
    prompt,
    negative_prompt: SD_NEG,
    params: {
      sampler_name: 'k_euler_a',
      cfg_scale: 8,
      width: w,
      height: h,
      steps: 30,
      seed: String(seed),
      n: 1,
      karras: true,
    },
    r2: true,
    nsfw: false,
  }

  let jobId
  try {
    console.log('Horde request:', JSON.stringify(body, null, 2))
    const res = await fetch('https://stablehorde.net/api/v2/generate/async', {
      method: 'POST',
      headers: { 'apikey': '0000000000', 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })

    const resText = await res.text()
    console.log(`Horde response ${res.status}:`, resText)

    if(!res.ok) {
      throw new Error(`${res.status}: ${resText.substring(0, 200)}`)
    }

    const data = JSON.parse(resText)
    jobId = data?.id || data?.request_id
    if(!jobId) throw new Error(`No job ID in response: ${resText.substring(0, 100)}`)
  } catch(e) {
    throw new Error(`Queue failed: ${e.message}`)
  }

  setCardMsg(slotId, 'In GPU queue…')

  // Poll every 2.5s with timeout
  const startTime = Date.now()
  const maxWait = 5 * 60 * 1000  // 5 min timeout

  for(let i = 0; i < 200; i++) {
    if(Date.now() - startTime > maxWait) throw new Error('Queue timeout after 5 minutes')

    await sleep(2500)

    try {
      const chk = await fetch(`https://stablehorde.net/api/v2/generate/check/${jobId}`)
      if(!chk.ok) {
        console.warn(`Check failed ${chk.status}`)
        continue
      }

      const st = await chk.json()
      if(!st) continue

      // Update message
      if(st.wait_time > 0) {
        setCardMsg(slotId, `Queue position: ${st.queue_position || '?'} (~${st.wait_time}s)`)
      } else if(!st.done) {
        setCardMsg(slotId, 'GPU rendering…')
      } else {
        setCardMsg(slotId, 'Finalising…')
      }

      if(st.done) break
      if(st.faulted) throw new Error(`Worker faulted: ${st.fault}`)
    } catch(e) {
      // Keep polling even on transient errors
      console.warn('Poll error:', e.message)
    }
  }

  setCardMsg(slotId, 'Fetching result…')

  try {
    const final = await fetch(`https://stablehorde.net/api/v2/generate/status/${jobId}`)
    if(!final.ok) throw new Error(`Status error ${final.status}`)

    const data = await final.json()
    if(!data.generations || data.generations.length === 0) {
      throw new Error('No generations in response')
    }

    const imgUrl = data.generations[0].img
    if(!imgUrl) throw new Error('No image URL')

    setCardMsg(slotId, 'Downloading…')
    const imgRes = await fetch(imgUrl)
    if(!imgRes.ok) throw new Error(`Image fetch ${imgRes.status}`)

    const blob = await imgRes.blob()
    return { src: URL.createObjectURL(blob), generator: 'Stable Diffusion' }
  } catch(e) {
    throw new Error(`Result error: ${e.message}`)
  }
}

// ── Hugging Face Inference API — free, no auth ──
async function huggingFaceInference(prompt, seed, slotId) {
  setCardMsg(slotId, 'Queuing on Hugging Face…')

  // Use Stable Diffusion XL (state-of-art free model)
  const model = 'stabilityai/stable-diffusion-xl-base-1.0'
  const url = `https://api-inference.huggingface.co/models/${model}`

  try {
    const payload = {
      inputs: prompt,
      parameters: {
        negative_prompt: SD_NEG,
        num_inference_steps: 30,
        guidance_scale: 8,
        seed,
      },
    }

    setCardMsg(slotId, 'HF generating…')
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })

    if (!res.ok) {
      const txt = await res.text()
      throw new Error(`HF error ${res.status}: ${txt.substring(0, 100)}`)
    }

    const blob = await res.blob()
    if (!blob.type.startsWith('image/')) {
      throw new Error(`HF returned non-image: ${blob.type}`)
    }

    setCardMsg(slotId, 'HF done!')
    return { src: URL.createObjectURL(blob), generator: 'Hugging Face SDXL' }
  } catch (e) {
    throw new Error(`Hugging Face failed: ${e.message}`)
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms))

// ─── Card rendering ───────────────────────────────────────────────────────────
function renderGrid(n) {
  const grid = document.getElementById('outGrid')
  grid.className = `out-grid n${n === 1 ? 1 : 2}`
  grid.innerHTML = Array.from({ length: n }, (_, i) => `
    <div class="out-card" id="card-${i}">
      <div class="card-ld" id="card-ld-${i}">
        <div class="mini-ring"></div>
        <div class="card-ld-msg" id="card-msg-${i}">Initialising…</div>
      </div>
      <div class="card-ph" id="card-ph-${i}" style="display:none">
        <div class="card-ph-icon">✦</div>
      </div>
      <div class="card-er" id="card-er-${i}">
        <div class="card-er-txt" id="card-er-txt-${i}"></div>
        <button class="card-retry" onclick="generate()">↺ Retry all</button>
      </div>
      <img class="card-img" id="card-img-${i}" alt="Generated image">
      <div class="card-foot" id="card-foot-${i}">
        <div class="card-gen-badge" id="card-badge-${i}">
          <span class="badge-dot"></span><span></span>
        </div>
        <div class="card-actions-row">
          <button class="card-prompt-btn" onclick="toggleCardPrompt(${i})">Prompt</button>
          <a class="card-dl" id="card-dl-${i}" download="irreallab-${Date.now()}-${i}.png">↓ Save</a>
        </div>
      </div>
      <div class="card-prompt-drawer" id="card-drawer-${i}"></div>
    </div>
  `).join('')
}

function setCardState(id, state, src, generator, fluxPrompt, sdPrompt, errMsg) {
  const ld   = document.getElementById(`card-ld-${id}`)
  const ph   = document.getElementById(`card-ph-${id}`)
  const er   = document.getElementById(`card-er-${id}`)
  const img  = document.getElementById(`card-img-${id}`)
  const foot = document.getElementById(`card-foot-${id}`)

  ld.style.display   = 'none'
  ph.style.display   = 'none'
  er.style.display   = 'none'
  img.style.display  = 'none'
  foot.classList.remove('show')

  if(state === 'ld') {
    ld.style.display = 'flex'
  } else if(state === 'er') {
    er.style.display = 'flex'
    document.getElementById(`card-er-txt-${id}`).textContent = errMsg || 'Generation failed.'
  } else if(state === 'img') {
    img.src = src
    img.style.display = 'block'
    foot.classList.add('show')
    document.getElementById(`card-dl-${id}`).href = src
    const badge = document.getElementById(`card-badge-${id}`)
    badge.querySelector('span:last-child').textContent = generator
    // Store both prompts for the drawer
    const drawer = document.getElementById(`card-drawer-${id}`)
    const isFlux = generator.includes('Flux') || generator.includes('Pollinations')
    drawer.dataset.fluxPrompt = fluxPrompt || ''
    drawer.dataset.sdPrompt   = sdPrompt   || ''
    drawer.dataset.generator  = generator  || ''
  }
}

function setCardMsg(id, msg) {
  const el = document.getElementById(`card-msg-${id}`)
  if(el) el.textContent = msg
}

function toggleCardPrompt(id) {
  const drawer = document.getElementById(`card-drawer-${id}`)
  if(!drawer) return
  const isOpen = drawer.classList.contains('open')
  if(!isOpen) {
    const gen = drawer.dataset.generator || ''
    const isFlux = gen.includes('Pollinations')
    const prompt = isFlux ? drawer.dataset.fluxPrompt : drawer.dataset.sdPrompt
    const label  = isFlux ? 'FLUX prompt (natural language):' : 'SD prompt (weighted tags):'
    drawer.innerHTML = `<span style="color:var(--accent);font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;">${label}</span><br><br>${prompt}`
  }
  drawer.classList.toggle('open')
}

// ─── UI helpers ───────────────────────────────────────────────────────────────
function setStyle(el) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'))
  el.classList.add('on')
  activeStyle = el.dataset.s
}
function setRatio(el) {
  document.querySelectorAll('#ratioRow .s-btn').forEach(b => b.classList.remove('on'))
  el.classList.add('on')
  imgW = parseInt(el.dataset.w)
  imgH = parseInt(el.dataset.h)
}
function setVar(el) {
  document.querySelectorAll('#varRow .s-btn').forEach(b => b.classList.remove('on'))
  el.classList.add('on')
  varCount = parseInt(el.dataset.v)
  // Update the placeholder grid
  const grid = document.getElementById('outGrid')
  if(!grid.querySelector('.out-card .card-ld')) {
    grid.className = `out-grid n${varCount === 1 ? 1 : 2}`
    grid.innerHTML = Array.from({length: varCount}, () => `
      <div class="out-card">
        <div class="card-ph"><div class="card-ph-icon">✦</div></div>
      </div>`).join('')
  }
}
function grow(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 200) + 'px'
}
function onKey(e) {
  if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate() }
}
function showToast(msg, type='') {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = 'toast on' + (type ? ' '+type : '')
  clearTimeout(el._t)
  el._t = setTimeout(() => el.className = 'toast', 3200)
}

// ─── History ──────────────────────────────────────────────────────────────────
function addHistory(src, idea) {
  history.unshift({ src, idea })
  if(history.length > 20) history.pop()
  renderHistory()
}
function renderHistory() {
  if(!history.length) { document.getElementById('histWrap').style.display = 'none'; return }
  document.getElementById('histWrap').style.display = 'block'
  document.getElementById('histGrid').innerHTML = history.map((item, i) => `
    <div class="hi" onclick="loadHist(${i})" title="${item.idea}">
      <img src="${item.src}" alt="" loading="lazy">
      <div class="hi-ov"><span>↑ Load</span></div>
    </div>`).join('')
}
function loadHist(i) {
  const el = document.getElementById('idea')
  el.value = history[i].idea
  grow(el)
  window.scrollTo({ top: 0, behavior: 'smooth' })
}
function clearHistory() {
  history = []
  renderHistory()
  showToast('History cleared', 'ok')
}
</script>
